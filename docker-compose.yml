services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scalioni}
      POSTGRES_USER: ${POSTGRES_USER:-scalioni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scalioni}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scalioni}"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scalioni}:${POSTGRES_PASSWORD:-scalioni}@postgres:5432/${POSTGRES_DB:-scalioni}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      FRONTEND_URL: http://localhost:3000
      DEBUG: "true"
      TZ: America/Sao_Paulo
    volumes:
      - ./backend:/app/backend
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scalioni.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_JWT_SECRET: ${SECRET_KEY:-dev-secret-key}
      NEXT_PUBLIC_WHATSAPP: "5511999999999"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:

