<!DOCTYPE html>

<script>

      theme: {
        extend: {
          colors: {
            'luxury-gold': '#C9A55A',
            'luxury-black': '#111111',
            'input-black': '#0A0A0A',
            'luxury-white': '#F5F0E8',

            playfair: ['"Playfair Display"', 'serif'],

      ring-color: #C9A55A !important;

<body class="bg-black flex items-center justify-center min-h-screen p-4">

</div>

<!-- BEGIN: CheckoutForm -->
<form class="p-6 space-y-5" onsubmit="return false;">
<!-- Name Field -->
<div class="space-y-2">
<label class="block font-outfit text-[10px] tracking-widest text-luxury-gold font-bold uppercase" for="full-name">NOME COMPLETO</label>
<input class="w-full bg-input-black border border-white/10 text-luxury-white font-outfit px-4 py-3 rounded-none field-focus-gold transition-all" id="full-name" placeholder="Seu nome completo" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-outfit text-[10px] tracking-widest text-luxury-gold font-bold uppercase" for="email">E-MAIL</label>
<input class="w-full bg-input-black border border-white/10 text-luxury-white font-outfit px-4 py-3 rounded-none field-focus-gold transition-all" id="email" placeholder="seu@email.com" type="email"/>
</div>
<!-- Phone Field -->
<div class="space-y-2">
<label class="block font-outfit text-[10px] tracking-widest text-luxury-gold font-bold uppercase" for="phone">TELEFONE / WHATSAPP</label>
<input class="w-full bg-input-black border border-white/10 text-luxury-white font-outfit px-4 py-3 rounded-none field-focus-gold transition-all" id="phone" placeholder="(11) 99999-9999" type="tel"/>
</div>
<!-- Download Note -->
<p class="text-luxury-silver font-outfit text-[11px] leading-relaxed py-2">
          O link de download será enviado para seu e-mail em até 5 minutos após o pagamento.
        </p>
<!-- Main CTA Button -->
<button class="w-full bg-luxury-gold hover:bg-[#b8944a] active:scale-[0.98] text-input-black font-outfit font-bold py-4 px-6 uppercase tracking-wider transition-all duration-300 flex justify-center items-center gap-2 group" type="submit">
          PAGAR COM MERCADO PAGO 
          <span class="group-hover:translate-x-1 transition-transform">→</span>
</button>
</form>
<!-- END: CheckoutForm -->
