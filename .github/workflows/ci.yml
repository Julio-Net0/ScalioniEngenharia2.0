name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment File
        run: |
          cp .env.example .env
          echo "MP_ACCESS_TOKEN=dummy_token" >> .env
          echo "SECRET_KEY=dev-secret-key-at-least-thirty-two-chars" >> .env

      - name: Start Docker Compose Services
        run: |
          docker compose up -d postgres backend

      - name: Run Pytest in Backend Container
        run: |
          docker compose exec -T backend pytest backend/tests/ -v

      - name: Stop Services
        if: always()
        run: |
          docker compose down

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run Build
        working-directory: ./frontend
        run: npm run build
